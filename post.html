<!DOCTYPE html>
<html>
<head>
  <title>Post Detay</title>
</head>
<body>

<h1 id="title"></h1>
<p id="hat"></p>
<p id="tarih"></p>
<img id="foto" width="400">

<script>
document.addEventListener("DOMContentLoaded", () => {

  const id = window.location.pathname.replace("/", "");

  if (!id) {
    document.body.innerHTML = "<h1>Post bulunamadı</h1>";
    return;
  }

  fetch("https://script.google.com/macros/s/AKfycbwBlBhvhTGCtv5ak87myI8qICgwPqYebfz4WukjbEGCqxAKe4hFL8aNp4dRgcknGgEp/exec")
    .then(res => res.json())
    .then(data => {

      const post = data[id];

      if (!post) {
        document.body.innerHTML = "<h1>Post bulunamadı</h1>";
        return;
      }

      document.getElementById("arac").innerText = post.aracKodu;
      document.getElementById("hat").innerText = "Hat: " + post.hatKodu;
      document.getElementById("tarih").innerText = "Çekim: " + post.cekimTarihi;
      document.getElementById("kullanici").innerText = "Yükleyen: " + post.cekimci;

      const foto = post.foto?.replace("open?id=", "uc?id=");
      document.getElementById("foto").src = foto;

    });

});
</script>

</body>
</html>
