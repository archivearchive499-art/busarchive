<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Post Detay</title>

  <style>
    body {
      font-family: Arial;
      margin: 20px;
      background: #f5f5f5;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 10px;
    }

    .label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    h1 {
      font-size: 22px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 id="title">Yükleniyor...</h1>

  <span class="label">Hat Kodu</span>
  <p id="hat"></p>

  <span class="label">Çekim Tarihi</span>
  <p id="tarih"></p>

  <span class="label">Kullanıcı</span>
  <p id="user"></p>

  <span class="label">Fotoğraf</span>
  <img id="foto">

  <p id="error" style="color:red;"></p>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // 🔥 ID alma (Netlify uyumlu)
  let id = window.location.pathname.split("/").filter(Boolean)[0];

  console.log("ID:", id);

  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbw9AnPPPm3YG445yonndwMavmzl2yiGV3MJu6-ypvyCw3MACTkLo9Ipfij2Pzp9AXt03A/exec");

    const text = await res.text();
    const data = JSON.parse(text);

    console.log("DATA:", data);

    const post = data[id];

    if (!post) {
      document.getElementById("error").innerText = "Post bulunamadı: " + id;
      return;
    }

    document.getElementById("title").innerText = post.aracKodu || "-";
    document.getElementById("hat").innerText = post.hatKodu || "-";
    document.getElementById("tarih").innerText = post.cekimTarihi || "-";
    document.getElementById("user").innerText = post.hesapAdi || "-";

    let foto = post.foto;

    if (foto.includes("drive.google.com")) {
    const fileId = foto.match(/[-\w]{25,}/);

    if (fileId) {
      foto = `https://drive.google.com/uc?export=view&id=${fileId[0]}`;
  }
}

    document.getElementById("foto").src = foto;

  } catch (err) {
    console.error(err);
    document.getElementById("error").innerText = "API hatası oluştu";
  }

});
</script>

</body>
</html>
