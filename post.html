<script>
document.addEventListener("DOMContentLoaded", async () => {

  // 🔥 temiz ID alma (EN KRİTİK FIX)
  let id = window.location.pathname;
  id = id.replace("/", "").replace("/", "");

  console.log("CLEAN ID:", id);

  const res = await fetch("https://script.google.com/macros/s/AKfycbw9AnPPPm3YG445yonndwMavmzl2yiGV3MJu6-ypvyCw3MACTkLo9Ipfij2Pzp9AXt03A/exec");
  const data = await res.json();

  console.log("DATA KEYS:", Object.keys(data));

  const post = data[id];

  console.log("POST:", post);

  if (!post) {
    document.body.innerHTML = `
      <h1>Post bulunamadı</h1>
      <p>ID: ${id}</p>
    `;
    return;
  }

  document.getElementById("title").innerText = post.aracKodu;
  document.getElementById("hat").innerText = post.hatKodu;
  document.getElementById("tarih").innerText = post.cekimTarihi;
  document.getElementById("user").innerText = post.hesapAdi;

  document.getElementById("foto").src =
    post.foto.replace("open?id=", "uc?id=");

});
</script>
