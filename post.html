<script>
document.addEventListener("DOMContentLoaded", async () => {

  const id = window.location.pathname.replace("/", "");

  console.log("URL ID:", id);

  try {
    const res = await fetch("https://script.google.com/macros/s/AKfycbwBlBhvhTGCtv5ak87myI8qICgwPqYebfz4WukjbEGCqxAKe4hFL8aNp4dRgcknGgEp/exec");
    const data = await res.json();

    console.log("API DATA:", data);

    const post = data[id];

    console.log("POST:", post);

    if (!post) {
      document.body.innerHTML = "<h1>Post bulunamadı</h1>";
      return;
    }

    document.getElementById("title").innerText = post.aracKodu;
    document.getElementById("hat").innerText = post.hatKodu;
    document.getElementById("tarih").innerText = post.cekimTarihi;
    document.getElementById("user").innerText = post.hesapAdi;

    document.getElementById("foto").src =
      post.foto.replace("open?id=", "uc?id=");

  } catch (err) {
    console.error(err);
    document.body.innerHTML = "<h1>API Hatası</h1>";
  }

});
</script>
